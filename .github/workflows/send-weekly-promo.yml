name: Enviar promo semanal por WhatsApp

on:
  schedule:
    # Todos los lunes a las 13:00 UTC (10:00 hora Argentina)
    # Cambiá este horario si querés otro día/hora: https://crontab.guru
    - cron: "0 13 * * MON"
  workflow_dispatch: {}
    # ^ Esto te permite ejecutarlo manualmente desde GitHub cuando quieras, sin esperar al cron

jobs:
  enviar-promo:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enviar mensajes
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PHONE_NUMBER_ID: ${{ secrets.PHONE_NUMBER_ID }}
          TEMPLATE_NAME: ${{ secrets.TEMPLATE_NAME }}
          TEMPLATE_LANG: ${{ secrets.TEMPLATE_LANG }}
          TEMPLATE_VARS: ${{ secrets.TEMPLATE_VARS }}
        run: node send-promo.js
